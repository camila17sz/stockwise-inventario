<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('Categorías')}"></head>
<body>
<div class="layout">
    <div th:replace="~{layout :: sidebar('categorias')}"></div>
    <main class="main-content">
        <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;">
            <div>
                <h1 class="page-title">Categorías</h1>
                <p class="page-subtitle">Organiza tus productos por categoría</p>
            </div>
            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/categorias/nuevo}"
               class="btn-primary"
               style="text-decoration:none;padding:10px 18px;border-radius:10px;font-weight:600;font-size:14px;">
                + Nueva Categoría
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>
        <div sec:authorize="hasRole('VISOR')" class="alert alert-warning">
            👁 Estás en modo solo lectura.
        </div>

        <div class="card table-container">
            <div th:if="${#lists.isEmpty(categorias)}" style="color:var(--text-2);font-size:14px;padding:30px 0;text-align:center;">
                No hay categorías registradas aún.
            </div>
            <table th:unless="${#lists.isEmpty(categorias)}">
                <thead><tr>
                    <th>#</th><th>Nombre</th><th>Descripción</th><th>Estado</th>
                    <th sec:authorize="hasRole('ADMIN')">Acciones</th>
                </tr></thead>
                <tbody>
                    <tr th:each="c : ${categorias}">
                        <td th:text="${c.id}" style="color:var(--text-2);">1</td>
                        <td style="font-weight:500;" th:text="${c.nombre}">—</td>
                        <td style="font-size:13px;color:var(--text-2);" th:text="${c.descripcion ?: '—'}">—</td>
                        <td>
                            <span th:if="${c.activo}" class="badge badge-success">Activa</span>
                            <span th:unless="${c.activo}" class="badge badge-danger">Inactiva</span>
                        </td>
                        <td sec:authorize="hasRole('ADMIN')" style="display:flex;gap:6px;">
                            <a th:href="@{/categorias/editar/{id}(id=${c.id})}" class="btn-sm btn-edit">Editar</a>
                            <a th:href="@{/categorias/eliminar/{id}(id=${c.id})}" class="btn-sm btn-delete"
                               onclick="return confirm('¿Eliminar esta categoría?')">Eliminar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
</body>
</html>
