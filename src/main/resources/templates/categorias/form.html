<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Categoría')}"></head>
<body>
<div class="layout">
    <div th:replace="~{layout :: sidebar('categorias')}"></div>
    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title" th:text="${categoria.id != null} ? 'Editar Categoría' : 'Nueva Categoría'">Categoría</h1>
            <p class="page-subtitle">Completa los datos de la categoría</p>
        </div>
        <div class="card" style="max-width:560px;">
            <form th:action="@{/categorias/guardar}" th:object="${categoria}" method="post">
                <input type="hidden" th:field="*{id}"/>
                <div class="form-group">
                    <label>Nombre *</label>
                    <input type="text" th:field="*{nombre}" class="form-control" placeholder="Nombre de la categoría"/>
                    <div class="field-error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <textarea th:field="*{descripcion}" class="form-control" rows="3" placeholder="Descripción de la categoría"></textarea>
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select th:field="*{activo}" class="form-control">
                        <option value="true">Activa</option>
                        <option value="false">Inactiva</option>
                    </select>
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div style="display:flex;gap:12px;margin-top:8px;">
                    <button type="submit" class="btn-primary">Guardar Categoría</button>
                    <a th:href="@{/categorias}" style="display:inline-block;padding:10px 16px;border-radius:10px;border:1px solid var(--border);color:var(--text-2);text-decoration:none;font-size:14px;">Cancelar</a>
                </div>
            </form>
        </div>
    </main>
</div>
</body>
</html>
