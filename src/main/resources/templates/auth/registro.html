<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>StockWise — Crear cuenta</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
    <style>
        .reg-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            padding: 40px 16px;
        }
        .reg-box {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 460px;
        }
        .reg-logo {
            font-family: var(--font-display);
            font-size: 26px;
            font-weight: 800;
            color: var(--accent);
            text-align: center;
            margin-bottom: 6px;
        }
        .reg-subtitle {
            text-align: center;
            color: var(--text-2);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            color: var(--text-2);
            font-size: 13px;
            margin-bottom: 7px;
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            background: var(--bg-3);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 14px;
            color: var(--text);
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color .2s;
        }
        .form-control:focus { border-color: var(--accent); }

        /* Selector de rol */
        .rol-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 4px;
        }
        .rol-option { flex: 1; }
        .rol-option input[type="radio"] { display: none; }
        .rol-option label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 14px 8px;
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: border-color .2s, background .2s;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-2);
            margin-bottom: 0;
        }
        .rol-option label .rol-icon { font-size: 22px; }
        .rol-option input[type="radio"]:checked + label {
            border-color: var(--accent);
            background: rgba(0, 255, 180, 0.06);
            color: var(--accent);
        }
        .rol-option label:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        /* Campo de código de acceso (oculto por defecto) */
        .codigo-group {
            display: none;
            margin-top: 4px;
            animation: fadeIn .25s ease;
        }
        .codigo-group.visible { display: block; }
        @keyframes fadeIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: none; } }

        .codigo-hint {
            font-size: 12px;
            color: var(--text-2);
            margin-top: 6px;
            padding: 8px 12px;
            background: var(--bg-3);
            border-radius: 8px;
            border-left: 3px solid var(--accent);
        }

        .btn-registrar {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity .2s;
        }
        .btn-registrar:hover { opacity: 0.85; }
        .btn-back {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: var(--text-2);
            font-size: 13px;
            text-decoration: none;
            transition: color .2s;
        }
        .btn-back:hover { color: var(--accent); }

        .alert {
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .alert-danger { background: #2d1a1a; border: 1px solid #7f2020; color: #ff6b6b; }

        .section-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--text-2);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="reg-wrapper">
    <div class="reg-box">
        <div class="reg-logo">⬡ StockWise</div>
        <div class="reg-subtitle">Crea tu cuenta</div>

        <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

        <form th:action="@{/registro}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- Datos personales -->
            <div class="form-group">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" name="nombre" class="form-control"
                       placeholder="Tu nombre" required
                       th:value="${nombre}"/>
            </div>
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" class="form-control"
                       placeholder="correo@ejemplo.com" required
                       th:value="${email}"/>
            </div>
            <div class="form-group">
                <label for="username">Nombre de usuario</label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="usuario123" required autocomplete="username"
                       th:value="${username}"/>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Mínimo 6 caracteres" required autocomplete="new-password"
                       minlength="6"/>
            </div>
            <div class="form-group">
                <label for="confirmarPassword">Confirmar contraseña</label>
                <input type="password" id="confirmarPassword" name="confirmarPassword"
                       class="form-control" placeholder="Repite tu contraseña" required
                       autocomplete="new-password" minlength="6"/>
            </div>

            <!-- Selector de rol -->
            <div class="form-group">
                <div class="section-label">Tipo de cuenta</div>
                <div class="rol-selector">

                    <div class="rol-option">
                        <input type="radio" id="rolVisor" name="rol" value="VISOR"
                               th:checked="${rol == 'VISOR' or rol == null}"/>
                        <label for="rolVisor">
                            <span class="rol-icon">👁️</span>
                            Visor
                        </label>
                    </div>

                    <div class="rol-option">
                        <input type="radio" id="rolManejador" name="rol" value="MANEJADOR"
                               th:checked="${rol == 'MANEJADOR'}"/>
                        <label for="rolManejador">
                            <span class="rol-icon">📦</span>
                            Manejador
                        </label>
                    </div>

                    <div class="rol-option">
                        <input type="radio" id="rolAdmin" name="rol" value="ADMIN"
                               th:checked="${rol == 'ADMIN'}"/>
                        <label for="rolAdmin">
                            <span class="rol-icon">🛡️</span>
                            Admin
                        </label>
                    </div>

                </div>
            </div>

            <!-- Campo código de acceso (aparece para Manejador y Admin) -->
            <div class="form-group codigo-group" id="codigoGroup">
                <label for="codigoAcceso">Código de acceso</label>
                <input type="password" id="codigoAcceso" name="codigoAcceso"
                       class="form-control" placeholder="Ingresa el código autorizado"
                       autocomplete="off"/>
                <p class="codigo-hint" id="codigoHint"></p>
            </div>

            <button type="submit" class="btn-registrar">Crear cuenta</button>
        </form>

        <a th:href="@{/login}" class="btn-back">← Ya tengo cuenta, iniciar sesión</a>
    </div>
</div>

<script>
    const radios      = document.querySelectorAll('input[name="rol"]');
    const codigoGroup = document.getElementById('codigoGroup');
    const codigoInput = document.getElementById('codigoAcceso');
    const codigoHint  = document.getElementById('codigoHint');

    const hints = {
        MANEJADOR: 'Este rol permite gestionar movimientos de inventario. Se requiere código de autorización.',
        ADMIN:     'Este rol tiene acceso total al sistema. Se requiere código de autorización.'
    };

    function actualizarCodigo() {
        const rolSeleccionado = document.querySelector('input[name="rol"]:checked')?.value;
        const necesitaCodigo  = rolSeleccionado === 'MANEJADOR' || rolSeleccionado === 'ADMIN';

        codigoGroup.classList.toggle('visible', necesitaCodigo);
        codigoInput.required = necesitaCodigo;
        codigoHint.textContent = hints[rolSeleccionado] || '';
    }

    radios.forEach(r => r.addEventListener('change', actualizarCodigo));
    actualizarCodigo(); // estado inicial (por si el form regresa con error)
</script>
</body>
</html>
