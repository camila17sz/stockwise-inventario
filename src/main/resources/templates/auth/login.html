<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>StockWise — Iniciar Sesión</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
        }
        .login-box {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
        }
        .login-logo {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
            text-align: center;
            margin-bottom: 8px;
        }
        .login-subtitle {
            text-align: center;
            color: var(--text-2);
            font-size: 14px;
            margin-bottom: 36px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            color: var(--text-2);
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            background: var(--bg-3);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--text);
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color .2s;
        }
        .form-control:focus { border-color: var(--accent); }
        .btn-login {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity .2s;
        }
        .btn-login:hover { opacity: 0.85; }
        .btn-register {
            width: 100%;
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 10px;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            text-decoration: none;
            display: block;
            text-align: center;
            transition: background .2s, color .2s;
        }
        .btn-register:hover {
            background: var(--accent);
            color: #000;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0 8px;
            color: var(--text-2);
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .alert {
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .alert-danger  { background: #2d1a1a; border: 1px solid #7f2020; color: #ff6b6b; }
        .alert-success { background: #0d2e26; border: 1px solid #00a88a; color: var(--accent); }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-box">
        <div class="login-logo">⬡ StockWise</div>
        <div class="login-subtitle">Sistema de Gestión de Inventario</div>

        <div th:if="${errorMsg}"   class="alert alert-danger"  th:text="${errorMsg}"></div>
        <div th:if="${logoutMsg}"  class="alert alert-success" th:text="${logoutMsg}"></div>
        <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="Ingresa tu usuario" required autofocus/>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="••••••••" required/>
            </div>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-login">Iniciar Sesión</button>
        </form>

        <div class="divider">¿No tienes cuenta?</div>
        <a th:href="@{/registro}" class="btn-register">Crear cuenta nueva</a>
    </div>
</div>
</body>
</html>
