<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('Proveedores')}"></head>
<body>
<div class="layout">
    <div th:replace="~{layout :: sidebar('proveedores')}"></div>
    <main class="main-content">
        <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;">
            <div>
                <h1 class="page-title">Proveedores</h1>
                <p class="page-subtitle">Gestiona los proveedores registrados</p>
            </div>
            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/proveedores/nuevo}"
               class="btn-primary"
               style="text-decoration:none;padding:10px 18px;border-radius:10px;font-weight:600;font-size:14px;">
                + Nuevo Proveedor
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>
        <div sec:authorize="hasRole('VISOR')" class="alert alert-warning">
            👁 Estás en modo solo lectura.
        </div>

        <div class="card table-container">
            <div th:if="${#lists.isEmpty(proveedores)}" style="color:var(--text-2);font-size:14px;padding:30px 0;text-align:center;">
                No hay proveedores registrados aún.
            </div>
            <table th:unless="${#lists.isEmpty(proveedores)}">
                <thead><tr>
                    <th>#</th><th>Nombre</th><th>Email</th><th>Teléfono</th><th>Dirección</th><th>Estado</th>
                    <th sec:authorize="hasRole('ADMIN')">Acciones</th>
                </tr></thead>
                <tbody>
                    <tr th:each="pv : ${proveedores}">
                        <td th:text="${pv.id}" style="color:var(--text-2);">1</td>
                        <td style="font-weight:500;" th:text="${pv.nombre}">—</td>
                        <td style="font-size:13px;" th:text="${pv.email ?: '—'}">—</td>
                        <td th:text="${pv.telefono ?: '—'}">—</td>
                        <td style="font-size:13px;color:var(--text-2);" th:text="${pv.direccion ?: '—'}">—</td>
                        <td>
                            <span th:if="${pv.activo}" class="badge badge-success">Activo</span>
                            <span th:unless="${pv.activo}" class="badge badge-danger">Inactivo</span>
                        </td>
                        <td sec:authorize="hasRole('ADMIN')" style="display:flex;gap:6px;">
                            <a th:href="@{/proveedores/editar/{id}(id=${pv.id})}" class="btn-sm btn-edit">Editar</a>
                            <a th:href="@{/proveedores/eliminar/{id}(id=${pv.id})}" class="btn-sm btn-delete"
                               onclick="return confirm('¿Eliminar este proveedor?')">Eliminar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
</body>
</html>
