<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Proveedor')}"></head>
<body>
<div class="layout">
    <div th:replace="~{layout :: sidebar('proveedores')}"></div>
    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title" th:text="${proveedor.id != null} ? 'Editar Proveedor' : 'Nuevo Proveedor'">Proveedor</h1>
            <p class="page-subtitle">Completa los datos del proveedor</p>
        </div>
        <div class="card" style="max-width:640px;">
            <form th:action="@{/proveedores/guardar}" th:object="${proveedor}" method="post">
                <input type="hidden" th:field="*{id}"/>
                <div class="form-group">
                    <label>Nombre *</label>
                    <input type="text" th:field="*{nombre}" class="form-control" placeholder="Nombre del proveedor o empresa"/>
                    <div class="field-error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                </div>
                <div class="form-grid-2">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="correo@empresa.com"/>
                        <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="text" th:field="*{telefono}" class="form-control" placeholder="300 000 0000"/>
                    </div>
                </div>
                <div class="form-group">
                    <label>Dirección</label>
                    <input type="text" th:field="*{direccion}" class="form-control" placeholder="Dirección del proveedor"/>
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select th:field="*{activo}" class="form-control">
                        <option value="true">Activo</option>
                        <option value="false">Inactivo</option>
                    </select>
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div style="display:flex;gap:12px;margin-top:8px;">
                    <button type="submit" class="btn-primary">Guardar Proveedor</button>
                    <a th:href="@{/proveedores}" style="display:inline-block;padding:10px 16px;border-radius:10px;border:1px solid var(--border);color:var(--text-2);text-decoration:none;font-size:14px;">Cancelar</a>
                </div>
            </form>
        </div>
    </main>
</div>
</body>
</html>
